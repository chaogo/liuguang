name: Liuguang
options:
  bundleIdPrefix: com.chao
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: "68YXSUY5US"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Liuguang:
    type: application
    platform: iOS
    sources:
      - path: Liuguang
    resources:
      - path: Liuguang/Resources
    info:
      path: Liuguang/Info.plist
      properties:
        CFBundleDisplayName: Liuguang
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Liuguang uses the camera to capture your 12 frames."
        NSPhotoLibraryAddUsageDescription: "Save developed photos to your library."
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.chao.liuguang.develop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chao.liuguang
        TARGETED_DEVICE_FAMILY: "1"
    dependencies: []

  LiuguangTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LiuguangTests
    dependencies:
      - target: Liuguang
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chao.liuguang.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Liuguang:
    build:
      targets:
        Liuguang: all
        LiuguangTests: [test]
    test:
      targets:
        - LiuguangTests
