<span>1/125s</span>
</div>
<div class="w-8 h-8 border border-surface-container-lowest/30 flex items-center justify-center">
<div class="w-1 h-1 bg-primary-container rounded-full animate-pulse"></div>
</div>
</div>
</div>
<div class="absolute inset-0 border-[24px] border-surface pointer-events-none"></div>
</div>
